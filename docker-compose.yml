services:
  lattice:
    image: ghcr.io/lattice-black/lattice:latest
    ports:
      - "8080:8080"
    volumes:
      - lattice-data:/data
      - ./lattice.yaml:/app/lattice.yaml:ro
    environment:
      - LATTICE_API_KEY=changeme
      - LATTICE_DB_PATH=/data/lattice.db
    restart: unless-stopped

volumes:
  lattice-data: